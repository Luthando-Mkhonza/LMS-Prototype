{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 50px auto;">
    <h2 style="margin-bottom: 30px; text-align: center;">Login to LMS</h2>

    <div style="background: #f8f9fa; padding: 30px; border-radius: 10px;">
        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required
                       placeholder="Enter username (john.employee or jane.manager)">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required
                       placeholder="Enter password (pass123)">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>

        <div style="margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 5px;">
            <h4 style="margin-bottom: 10px; font-size: 14px;">Demo Credentials:</h4>
            <p style="font-size: 13px; margin: 5px 0;"><strong>Employee:</strong> john.employee / pass123</p>
            <p style="font-size: 13px; margin: 5px 0;"><strong>Manager:</strong> jane.manager / pass123</p>
        </div>
    </div>
</div>
{% endblock %}
